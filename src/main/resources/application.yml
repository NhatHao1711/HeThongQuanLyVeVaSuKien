  # ===================== MAIL (Optional) =====================
  mail:
    host: smtp.gmail.com
    port: 587
    username: truonghuynhathao@gmail.com
    password: sakr mrrc whhl wkhk
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

# ===================== JWT =====================
jwt:
  secret: YourSuperSecretKeyForJWTTokenGenerationMustBeAtLeast256BitsLong!!2024
  expiration: 86400000  # 24 hours in milliseconds

# ===================== VNPAY =====================
vnpay:
  tmn-code: YOUR_TMN_CODE
  hash-secret: YOUR_HASH_SECRET
  pay-url: https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
  return-url: http://localhost:3000/payment/result
  api-url: https://sandbox.vnpayment.vn/merchant_webapi/api/transaction

# ===================== AES ENCRYPTION =====================
aes:
  secret-key: ThisIsA16ByteKey

# ===================== RABBITMQ QUEUES =====================
rabbitmq:
  queue:
    payment-completed: ticket.payment.completed
  exchange:
    ticket: ticket.exchange
  routing-key:
    payment-completed: ticket.payment.completed.key

# ===================== LOGGING =====================
logging:
  level:
    com.ticketbox: DEBUG
    org.springframework.security: DEBUG
